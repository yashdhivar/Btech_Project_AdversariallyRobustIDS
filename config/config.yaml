system:
  name: "Adversarial Robust IDS"
  version: "1.0"
  log_level: "INFO"
  log_file: "logs/ids.log"

dataset:
  # Options: "NSL-KDD", "CICIDS2017", "combined"
  primary: "CICIDS2017"
  path: "data/raw/CICIDS2017"
  secondary_path: "data/raw/CICIDS2017"
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  random_seed: 42

preprocessing:
  handle_missing: "median"
  encoding: "onehot"
  scaling: "standard"
  imbalance_method: "smote"
  top_features: 35

tier1:
  enabled: true
  signature_db: "data/signatures/signatures.json"
  match_threshold: 0.8

tier2:
  enabled: true
  model_type: "DNN"
  model_path: "models/tier2/best_model.h5"
  confidence_threshold: 0.5
  training:
    epochs: 30
    batch_size: 128
    learning_rate: 0.001
    optimizer: "adam"
    early_stopping_patience: 10
    dropout_rate: 0.3

tier3:
  enabled: true
  robust_model_path: "models/tier3/robust_model.pth"
  ensemble_models:
    - "models/tier3/ensemble_dnn.h5"
    - "models/tier3/ensemble_cnn.h5"
    - "models/tier3/ensemble_lstm.h5"
  adversarial_detection_threshold: 0.1
  defense_methods:
    - "adversarial_training"
    - "input_transformation"
    - "ensemble_voting"

