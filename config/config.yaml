adversarial_attacks:
  fgsm:
    epsilon: 0.1
  pgd:
    epsilon: 0.1
    alpha: 0.01
    num_iterations: 40
  cw:
    confidence: 0.0
    max_iterations: 100
    learning_rate: 0.01
  deepfool:
    max_iterations: 50

adversarial_training:
  epochs: 20
  clean_ratio: 0.4
  attack_mix:
    fgsm: 0.3
    pgd: 0.3
    cw: 0.2
    deepfool: 0.2

dashboard:
  host: "0.0.0.0"
  port: 8501
  refresh_interval: 2
